name: Release

# Запускается когда создаётся git tag вида v1.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Версия берётся из тега (убираем 'v' в начале)
env:
  FLUTTER_VERSION: '3.32.0'

jobs:

  # ─── Windows installer (.exe) ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Download Inno Setup
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Set version in Inno Setup script
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content packaging\windows\efir-setup.iss) `
            -replace '#define AppVersion\s+".*"', "#define AppVersion `"$version`"" |
            Set-Content packaging\windows\efir-setup.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\efir-setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/windows/Output/*.exe

  # ─── Linux .deb package ──────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            dpkg

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Build .deb package
        run: |
          chmod +x packaging/linux/build-deb.sh
          bash packaging/linux/build-deb.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: packaging/linux/output/*.deb

  # ─── Android APK (phone/tablet + Android TV) ─────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Декодируем keystore из GitHub Secret (base64)
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/efir-release.jks

      - name: Create key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=efir-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK (arm64 — для большинства устройств и Android TV)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/efir-${VERSION}-android-arm64.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/efir-*.apk

  # ─── Создать GitHub Release со всеми артефактами ─────────────────────────────
  create-release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EFIR Client ${{ github.ref_name }}"
          draft: true        # сначала черновик — проверить перед публикацией
          prerelease: false
          generate_release_notes: true
          files: |
            dist/windows-installer/*.exe
            dist/linux-deb/*.deb
            dist/android-apk/*.apk
          body: |
            ## Установка

            | Платформа | Файл | Инструкция |
            |---|---|---|
            | Windows 10/11 | `efir-setup-*-windows-x64.exe` | Запустить от администратора |
            | Linux (Ubuntu/Debian) | `efir-client_*_amd64.deb` | `sudo EFIR_USER=kiosk dpkg -i *.deb` |
            | Android / Android TV | `efir-*-android-arm64.apk` | `adb install -r *.apk` |
