name: Release

# Запускается когда создаётся git tag вида v1.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FLUTTER_VERSION: '3.44.0'

jobs:

  # ─── Windows installer (.exe) ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Версия из тега попадает В БИНАРНИК, а не только в имя файла.
      # Иначе клиент после обновления продолжит рапортовать старый build,
      # панель сочтёт обновление неустановленным и будет ставить его по кругу.
      - name: Resolve version and build number
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Монотонный versionCode: 1.2.3 -> 10203. Android не даст поставить
          # сборку с меньшим значением, и это же число сравнивает панель.
          BUILD=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "EFIR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "EFIR_BUILD=$BUILD"     >> "$GITHUB_ENV"
          echo "version=$VERSION build=$BUILD"

      # Публичный ключ проверки обновлений вшивается в бинарь: только он решает,
      # принимать ли сборку, раздаваемую панелью. Переменная не задана —
      # клиент собирается с отключёнными обновлениями (fail-closed).
      - name: Check update public key
        shell: bash
        run: |
          if [ -z "${{ vars.EFIR_UPDATE_PUBLIC_KEY }}" ]; then
            echo "::warning::EFIR_UPDATE_PUBLIC_KEY не задан — обновления через панель в этой сборке отключены"
          fi

      - name: Build Flutter Windows
        shell: bash
        run: |
          flutter build windows --release \
            --build-name="$EFIR_VERSION" --build-number="$EFIR_BUILD" \
            --dart-define=EFIR_UPDATE_PUBLIC_KEY=${{ vars.EFIR_UPDATE_PUBLIC_KEY }}

      # Через Chocolatey, а не прямой ссылкой: jrsoftware.org/download.php —
      # редирект на зеркало, и он уже отдавал не исполняемый файл, из-за чего
      # сборка падала на «file is corrupted and unreadable».
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe не найден после установки Inno Setup: $iscc"
          }
          & $iscc /? | Select-Object -First 1

      - name: Set version in Inno Setup script
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content packaging\windows\efir-setup.iss) `
            -replace '#define AppVersion\s+".*"', "#define AppVersion `"$version`"" |
            Set-Content packaging\windows\efir-setup.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\efir-setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: packaging/windows/Output/*.exe

  # ─── Linux universal tarball + install.sh ────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libmpv-dev libmpv1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Версия из тега попадает В БИНАРНИК, а не только в имя файла.
      # Иначе клиент после обновления продолжит рапортовать старый build,
      # панель сочтёт обновление неустановленным и будет ставить его по кругу.
      - name: Resolve version and build number
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Монотонный versionCode: 1.2.3 -> 10203. Android не даст поставить
          # сборку с меньшим значением, и это же число сравнивает панель.
          BUILD=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "EFIR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "EFIR_BUILD=$BUILD"     >> "$GITHUB_ENV"
          echo "version=$VERSION build=$BUILD"

      # Публичный ключ проверки обновлений вшивается в бинарь: только он решает,
      # принимать ли сборку, раздаваемую панелью. Переменная не задана —
      # клиент собирается с отключёнными обновлениями (fail-closed).
      - name: Check update public key
        shell: bash
        run: |
          if [ -z "${{ vars.EFIR_UPDATE_PUBLIC_KEY }}" ]; then
            echo "::warning::EFIR_UPDATE_PUBLIC_KEY не задан — обновления через панель в этой сборке отключены"
          fi

      - name: Build Flutter Linux
        run: |
          flutter build linux --release \
            --build-name="$EFIR_VERSION" --build-number="$EFIR_BUILD" \
            --dart-define=EFIR_UPDATE_PUBLIC_KEY=${{ vars.EFIR_UPDATE_PUBLIC_KEY }}

      - name: Build tarball
        env:
          EFIR_VERSION: ${{ github.ref_name }}
        run: |
          EFIR_VERSION="${EFIR_VERSION#v}"   # убираем 'v' из тега
          chmod +x packaging/linux/build-tar.sh
          EFIR_VERSION="$EFIR_VERSION" bash packaging/linux/build-tar.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-tar
          path: packaging/linux/output/*.tar.gz

  # ─── Android APK (phone/tablet + Android TV) ─────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Версия из тега попадает В БИНАРНИК, а не только в имя файла.
      # Иначе клиент после обновления продолжит рапортовать старый build,
      # панель сочтёт обновление неустановленным и будет ставить его по кругу.
      - name: Resolve version and build number
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Монотонный versionCode: 1.2.3 -> 10203. Android не даст поставить
          # сборку с меньшим значением, и это же число сравнивает панель.
          BUILD=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "EFIR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "EFIR_BUILD=$BUILD"     >> "$GITHUB_ENV"
          echo "version=$VERSION build=$BUILD"

      # Публичный ключ проверки обновлений вшивается в бинарь: только он решает,
      # принимать ли сборку, раздаваемую панелью. Переменная не задана —
      # клиент собирается с отключёнными обновлениями (fail-closed).
      - name: Check update public key
        shell: bash
        run: |
          if [ -z "${{ vars.EFIR_UPDATE_PUBLIC_KEY }}" ]; then
            echo "::warning::EFIR_UPDATE_PUBLIC_KEY не задан — обновления через панель в этой сборке отключены"
          fi

      # Декодируем keystore и создаём key.properties из GitHub Secrets.
      # Если секреты не заданы — APK будет подписан debug-ключом.
      - name: Setup signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/efir-release.jks
            cat > android/key.properties <<EOF
          storeFile=efir-release.jks
          storePassword=$KEYSTORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
            echo "Release signing configured."
          else
            echo "No keystore secrets found — will use debug signing."
          fi

      # Сплит по ABI: arm64-v8a — для современных устройств,
      # armeabi-v7a — для 32-битных SmartTV/Android TV (железо ARMv8-A,
      # но система прошита 32-битной → ставится только v7a).
      - name: Build APK (split per ABI — arm64 + armv7)
        run: |
          flutter build apk --release \
            --build-name="$EFIR_VERSION" --build-number="$EFIR_BUILD" \
            --dart-define=EFIR_UPDATE_PUBLIC_KEY=${{ vars.EFIR_UPDATE_PUBLIC_KEY }} \
            --target-platform android-arm,android-arm64 \
            --split-per-abi

      - name: Rename APKs with version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # убираем 'v' из тега
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/efir-${VERSION}-android-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             build/app/outputs/flutter-apk/efir-${VERSION}-android-armv7.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/efir-*.apk

  # ─── Создать GitHub Release со всеми артефактами ─────────────────────────────
  create-release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      # Подпись Ed25519 над sha256 каждого артефакта. Её вставляют в панель при
      # загрузке сборки, и её же проверяет клиент вшитым публичным ключом —
      # поэтому панель может раздавать обновления, не будучи доверенной стороной.
      - name: Sign artifacts
        env:
          UPDATE_SIGNING_KEY_BASE64: ${{ secrets.UPDATE_SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$UPDATE_SIGNING_KEY_BASE64" ]; then
            echo "::warning::UPDATE_SIGNING_KEY_BASE64 не задан — артефакты не подписаны, панель их не опубликует"
            exit 0
          fi
          python3 -m pip install --quiet cryptography
          python3 tools/sign_release.py --output dist/SIGNATURES.txt \
            dist/windows-installer/*.exe dist/linux-tar/*.tar.gz dist/android-apk/*.apk
          {
            echo "### Подписи артефактов"
            echo '```'
            cat dist/SIGNATURES.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "EFIR Client ${{ github.ref_name }}"
          # Публикуем сразу: GitHub Release — обычный способ скачать и
          # поставить клиент вручную, и лишний ручной шаг только задерживает
          # страницу загрузки. Раздача на работающие экраны идёт отдельно,
          # через раздел «Обновления» в панели.
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/windows-installer/*.exe
            dist/linux-tar/*.tar.gz
            dist/android-apk/*.apk
            dist/SIGNATURES.txt
          body: |
            ## Обновление экранов через панель

            `SIGNATURES.txt` содержит `файл  sha256  подпись`. При загрузке сборки
            в раздел «Обновления» панели вставьте подпись нужного артефакта —
            без неё релиз не опубликуется, а клиент его не примет.

            ## Установка вручную

            | Платформа | Файл | Инструкция |
            |---|---|---|
            | Windows 10/11 | `efir-setup-*-windows-x64.exe` | Запустить от администратора |
            | Linux (любой дистрибутив) | `efir-client_*_linux_amd64.tar.gz` | `tar xzf *.tar.gz && sudo ./*linux*/install.sh kiosk` |
            | Android / Android TV (64-бит) | `efir-*-android-arm64.apk` | `adb install -r *.apk` |
            | Android TV (32-бит, старые/дешёвые SmartTV) | `efir-*-android-armv7.apk` | `adb install -r *.apk` |
