name: Release

# Запускается когда создаётся git tag вида v1.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FLUTTER_VERSION: '3.44.0'

jobs:

  # ─── Windows installer (.exe) ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Download Inno Setup
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Set version in Inno Setup script
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content packaging\windows\efir-setup.iss) `
            -replace '#define AppVersion\s+".*"', "#define AppVersion `"$version`"" |
            Set-Content packaging\windows\efir-setup.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\efir-setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: packaging/windows/Output/*.exe

  # ─── Linux universal tarball + install.sh ────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libmpv-dev libmpv1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Build tarball
        env:
          EFIR_VERSION: ${{ github.ref_name }}
        run: |
          EFIR_VERSION="${EFIR_VERSION#v}"   # убираем 'v' из тега
          chmod +x packaging/linux/build-tar.sh
          EFIR_VERSION="$EFIR_VERSION" bash packaging/linux/build-tar.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-tar
          path: packaging/linux/output/*.tar.gz

  # ─── Android APK (phone/tablet + Android TV) ─────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Декодируем keystore и создаём key.properties из GitHub Secrets.
      # Если секреты не заданы — APK будет подписан debug-ключом.
      - name: Setup signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/efir-release.jks
            cat > android/key.properties <<EOF
          storeFile=efir-release.jks
          storePassword=$KEYSTORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
            echo "Release signing configured."
          else
            echo "No keystore secrets found — will use debug signing."
          fi

      - name: Build APK (arm64 — для большинства устройств и Android TV)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # убираем 'v' из тега
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/efir-${VERSION}-android-arm64.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/efir-*.apk

  # ─── Создать GitHub Release со всеми артефактами ─────────────────────────────
  create-release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "EFIR Client ${{ github.ref_name }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            dist/windows-installer/*.exe
            dist/linux-tar/*.tar.gz
            dist/android-apk/*.apk
          body: |
            ## Установка

            | Платформа | Файл | Инструкция |
            |---|---|---|
            | Windows 10/11 | `efir-setup-*-windows-x64.exe` | Запустить от администратора |
            | Linux (любой дистрибутив) | `efir-client_*_linux_amd64.tar.gz` | `tar xzf *.tar.gz && sudo ./*linux*/install.sh kiosk` |
            | Android / Android TV | `efir-*-android-arm64.apk` | `adb install -r *.apk` |
